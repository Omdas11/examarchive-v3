name: Manual Soft Reset Data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "SOFT_RESET" to confirm row cleanup'
        required: true
        type: string
      ingestion_mode:
        description: "Choose whether to clear ai_ingestions rows"
        required: true
        default: clear_ingestions
        type: choice
        options:
          - clear_ingestions
          - keep_ingestions
      bucket_mode:
        description: "Choose whether to clear the MD Ingestion Cache bucket files"
        required: true
        default: keep_files
        type: choice
        options:
          - keep_files
          - clear_files

jobs:
  soft-reset-data:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'SOFT_RESET' }}
        run: |
          echo "Confirmation failed. You must type 'SOFT_RESET'."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install tsx globally
        run: npm install -g tsx

      - name: Run soft reset
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          CMD="tsx scripts/soft-reset-data.ts"
          
          if [ "${{ github.event.inputs.ingestion_mode }}" = "keep_ingestions" ]; then
            CMD="$CMD --skip-ingestions"
          fi
          
          if [ "${{ github.event.inputs.bucket_mode }}" = "clear_files" ]; then
            CMD="$CMD --clear-bucket"
          fi
          
          echo "Running: npx $CMD"
          npx $CMD
