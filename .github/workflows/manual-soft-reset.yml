name: Manual Soft Reset Data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "SOFT_RESET" to confirm row cleanup'
        required: true
        type: string
      ingestion_mode:
        description: "Choose whether to clear ai_ingestions rows"
        required: true
        default: clear_ingestions
        type: choice
        options:
          - clear_ingestions
          - keep_ingestions

jobs:
  soft-reset-data:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'SOFT_RESET' }}
        run: |
          echo "Confirmation failed. You must type 'SOFT_RESET'."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install tsx globally
        run: npm install -g tsx

      - name: Run soft reset (clear ingestions)
        if: ${{ github.event.inputs.ingestion_mode == 'clear_ingestions' }}
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: npm run soft-reset:data

      - name: Run soft reset (keep ingestions)
        if: ${{ github.event.inputs.ingestion_mode == 'keep_ingestions' }}
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: npm run soft-reset:data:skip-ingestions
