name: Sync Appwrite Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/appwrite-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-document:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Pull the absolute latest changes from main to prevent non-fast-forward errors
      # We do this before the script runs so there are no unstaged changes conflicting with the pull
      - name: Pull latest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase

      - name: Run Appwrite sync script
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: npx tsx scripts/v2/sync-appwrite.ts

      - name: Commit Schema Documentation
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "docs: auto-update Appwrite schema live status"
          file_pattern: docs/
