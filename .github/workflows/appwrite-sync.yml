name: Sync Appwrite Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/appwrite-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-document:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Appwrite sync script
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: npx tsx scripts/sync-appwrite.ts

      - name: Commit Schema Documentation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update Appwrite schema live status"
          file_pattern: docs/
