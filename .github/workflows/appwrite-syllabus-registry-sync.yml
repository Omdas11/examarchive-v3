name: Appwrite Syllabus Registry Sync

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "docs/SYLLABUS_REGISTRY.md"
      - "scripts/sync-appwrite-syllabus-registry.js"
      - "scripts/appwrite-schema-setup.js"
      - ".github/workflows/appwrite-syllabus-registry-sync.yml"

permissions:
  contents: write

concurrency:
  group: syllabus-registry-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-registry:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync syllabus registry to Appwrite
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: npm run sync:appwrite-syllabus-registry

      - name: Commit updated syllabus registry status
        run: |
          if git diff --quiet -- docs/SYLLABUS_REGISTRY.md; then
            echo "No syllabus registry status changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/SYLLABUS_REGISTRY.md
          git commit -m "chore: update syllabus registry sync status"
          git push
