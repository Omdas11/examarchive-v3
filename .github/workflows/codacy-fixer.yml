name: Interactive Codacy Agent

on:
  issue_comment:
    types: [created] # Triggers whenever a new comment is posted

jobs:
  update-pr:
    # ONLY run if the comment is on a PR and contains "@ai-agent"
    if: ${{ github.event.issue.pull_request && contains(github.event.comment.body, '@ai-agent') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout PR Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # This is crucial: it switches from the main branch to the PR's specific branch
        run: gh pr checkout ${{ github.event.issue.number }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Run Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USER_COMMENT: ${{ github.event.comment.body }}
        # We pass your GitHub comment directly into the Python script
        run: python codacy_agent.py "$USER_COMMENT"

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # This checks if the AI actually changed anything before trying to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 AI Agent applied fixes" && git push)

      - name: Reply to PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.issue.number }} --body "✨ I've processed your request and updated the PR code!"
