name: Codacy Issue Fixer

on:
  workflow_dispatch: # Forces manual trigger to protect your API quota

jobs:
  fix-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Run Codacy Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python codacy_agent.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "🤖 AI Fix: Resolved UI/SEO and Codacy issues"
          title: "🤖 Automated Codacy Fixes"
          body: "This PR was generated by the custom Gemini agent to fix the UI/SEO and other problems to solve."
          branch: "codacy-auto-fix"
          delete-branch: true
