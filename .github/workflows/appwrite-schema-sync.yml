name: Appwrite Schema Sync

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "DATABASE_SCHEMA.md"
      - "scripts/sync-appwrite-schema.js"
      - "scripts/md-sync-utils.js"
      - "scripts/watch-md-sync.js"
      - "scripts/appwrite-schema-setup.js"
      - ".github/workflows/appwrite-schema-sync.yml"

permissions:
  contents: write

jobs:
  sync-schema:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync Appwrite schema and update markdown status
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: npm run sync:appwrite-schema:status

      - name: Commit updated DATABASE_SCHEMA.md status
        run: |
          if git diff --quiet -- DATABASE_SCHEMA.md MASTER_NOTES_PROMPT.md; then
            echo "No schema status changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DATABASE_SCHEMA.md MASTER_NOTES_PROMPT.md
          git commit -m "chore: update auto-generated schema sync status"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep 2
          done

          echo "Push failed after 3 attempts."
          exit 1
