name: Appwrite Schema Sync

on:
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force schema sync even if no files changed"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [ main ]
    paths:
      - "docs/launch/v2/DATABASE_SCHEMA.md"
      - "scripts/v2/sync-appwrite-schema.js"
      - "scripts/v2/md-sync-utils.js"
      - "scripts/v2/watch-md-sync.js"
      - "scripts/v2/appwrite-schema-setup.js"
      - ".github/workflows/appwrite-schema-sync.yml"

permissions:
  contents: write

jobs:
  sync-schema:
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'workflow_dispatch' || github.event.inputs.force_sync == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync Appwrite schema and update markdown status
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: npm run sync:appwrite-schema:status

      - name: Commit updated docs/launch/v2/DATABASE_SCHEMA.md status
        shell: bash
        run: |
          if git diff --quiet -- docs/launch/v2/DATABASE_SCHEMA.md MASTER_NOTES_PROMPT.md; then
            echo "No schema status changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/launch/v2/DATABASE_SCHEMA.md MASTER_NOTES_PROMPT.md
          git commit -m "chore: update auto-generated schema sync status"
          git fetch origin main
          if ! git rebase origin/main; then
            echo "Initial rebase failed; aborting to avoid pushing conflicted history."
            git rebase --abort || true
            exit 1
          fi

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi

            echo "Push failed on attempt ${attempt}; refreshing against origin/main."
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase failed on attempt ${attempt}; aborting to avoid pushing conflicted history."
              git rebase --abort || true
              exit 1
            fi
            case "$attempt" in
              1) sleep 2 ;;
              2) sleep 4 ;;
              *) sleep 8 ;;
            esac
          done

          echo "Push failed after 3 attempts."
          exit 1
