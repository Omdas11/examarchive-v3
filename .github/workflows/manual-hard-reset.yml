name: Manual AI Ingestion Hard Reset

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "RESET" to confirm you want to wipe and recreate the ingestion database'
        required: true
        type: string

jobs:
  reset-database:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'RESET' }}
        run: |
          echo "Confirmation failed. You must type 'RESET'."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Hard Reset Script
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: npx tsx scripts/hard-reset-ingestion.ts

      - name: Re-sync Appwrite v2 schemas after reset
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          npm run sync:appwrite-schema:status
          npm run sync:appwrite-ai
