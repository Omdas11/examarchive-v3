name: Appwrite AI Sync

on:
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force AI schema sync even if no files changed"
        required: false
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [ main ]
    paths:
      - "docs/ai-note-worker.md"
      - "scripts/v2/sync-appwrite-ai.js"
      - "scripts/v2/appwrite-schema-setup.js"
      - "scripts/v2/sync-appwrite-schema.js"
      - "scripts/hard-reset-ingestion.ts"
      - "appwrite/functions/ai-note-worker/**"
      - "src/app/api/ai/jobs/execute/route.ts"
      - ".github/workflows/appwrite-ai-sync.yml"

permissions:
  contents: read

concurrency:
  group: appwrite-ai-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-ai:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync Appwrite AI schema and functions
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          APPWRITE_AI_WORKER_BASE_URL: ${{ secrets.APPWRITE_AI_WORKER_BASE_URL }}
          APPWRITE_AI_WORKER_SHARED_SECRET: ${{ secrets.APPWRITE_AI_WORKER_SHARED_SECRET }}
        run: npm run sync:appwrite-ai
