name: Appwrite AI Sync

on:
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force AI schema sync even if no files changed"
        required: false
        default: false
        type: boolean
  push:
    branches: [ main ]
    paths:
      - "docs/AI_UPGRADE.md"
      - "scripts/v2/sync-appwrite-ai.js"
      - "scripts/v2/appwrite-schema-setup.js"
      - "scripts/v2/sync-appwrite-schema.js"
      - "scripts/ensure-md-ingestion-bucket.js"
      - "scripts/deploy-function.sh"
      - "appwrite-functions/pdf-generator/**"
      - "scripts/hard-reset-ingestion.ts"
      - ".github/workflows/appwrite-ai-sync.yml"

permissions:
  contents: read

concurrency:
  group: appwrite-ai-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-ai:
    if: github.actor != 'github-actions[bot]' || inputs.force_sync == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync Appwrite AI schema and functions
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          npm run ensure:md-ingestion-bucket
          npm run sync:appwrite-ai

      - name: Deploy pdf-generator Appwrite Function
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          FUNCTION_APPWRITE_API_KEY: ${{ secrets.FUNCTION_APPWRITE_API_KEY }}
          GOTENBERG_URL: ${{ secrets.GOTENBERG_URL }}
          GOTENBERG_AUTH_TOKEN: ${{ secrets.GOTENBERG_AUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          AI_JOB_WEBHOOK_SECRET: ${{ secrets.AI_JOB_WEBHOOK_SECRET }}
        run: bash scripts/deploy-function.sh
